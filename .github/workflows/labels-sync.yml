name: Label Sync

on:
  workflow_dispatch:
  push:
    paths:
      - .github/labels.json
      - .github/workflows/labels-sync.yml

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Ensure standard labels exist
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('node:fs');
            const path = '.github/labels.json';
            const labels = JSON.parse(fs.readFileSync(path, 'utf8'));

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100
            });
            const existingMap = new Map(existing.map((l) => [l.name.toLowerCase(), l]));

            for (const label of labels) {
              const key = label.name.toLowerCase();
              const current = existingMap.get(key);
              if (!current) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Created label: ${label.name}`);
                continue;
              }

              if (current.color.toLowerCase() !== label.color.toLowerCase() || (current.description || '') !== (label.description || '')) {
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: current.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Updated label: ${label.name}`);
              }
            }
