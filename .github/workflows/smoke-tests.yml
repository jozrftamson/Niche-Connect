name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: "20"

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (miniapp)
        run: |
          cd apps/miniapp
          npm install

      - name: Run agent smoke tests
        run: |
          npm run build
          node script/agent-smoke.mjs

      - name: Run a2a smoke tests
        run: |
          npm run build
          node script/a2a-smoke.mjs
