name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (miniapp)
        run: |
          cd apps/miniapp
          npm install

      - name: Run agent smoke tests
        run: |
          npm run build
          node script/agent-smoke.mjs

      - name: Run a2a smoke tests
        run: |
          npm run build
          node script/a2a-smoke.mjs
