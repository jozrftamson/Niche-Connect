name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: "20"

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (miniapp)
        run: |
          cd apps/miniapp
          npm install

      - name: Build root app
        run: npm run build

      - name: Start dev server and run smoke tests
        env:
          PORT: "5000"
          AGENT_BASE_URL: "http://localhost:5000"
          A2A_BASE_URL: "http://localhost:5000"
        run: |
          set -euo pipefail

          npm run dev &
          server_pid=$!
          trap 'kill "$server_pid" || true' EXIT

          node -e 'const url=(process.env.AGENT_BASE_URL||"http://localhost:5000")+"/api/health"; const deadline=Date.now()+60_000; const sleep=(ms)=>new Promise(r=>setTimeout(r,ms)); (async()=>{ while(Date.now()<deadline){ try{ const res=await fetch(url); if(res.ok){ process.exit(0); } } catch {} await sleep(1000); } console.error("Smoke server did not become ready:", url); process.exit(1); })();'

          npm run test:agents
          npm run test:a2a
