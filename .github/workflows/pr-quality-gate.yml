name: PR Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-root-quality:
    name: CI Root Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Build root app
        run: npm run build

  ci-miniapp-quality:
    name: CI Miniapp Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/miniapp
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint miniapp
        run: npm run lint

      - name: Build miniapp
        run: npm run build
