name: PR Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-root-quality:
    name: CI Root Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build root app
        run: npm run build

  ci-miniapp-quality:
    name: CI Miniapp Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/miniapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/miniapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint miniapp
        run: npm run lint

      - name: Build miniapp
        run: npm run build
