name: Issue Auto Assign

on:
  issues:
    types: [opened, edited, labeled, unlabeled]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue by label rule
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info('No issue in event payload.');
              return;
            }

            const labels = (issue.labels || []).map((l) => (l.name || '').toLowerCase());
            const owners = {
              bug: '${{ vars.ISSUE_OWNER_BUG }}',
              feature: '${{ vars.ISSUE_OWNER_FEATURE }}',
              'tech-debt': '${{ vars.ISSUE_OWNER_TECH_DEBT }}',
              docs: '${{ vars.ISSUE_OWNER_DOCS }}'
            };

            let selected = '';
            for (const key of ['bug', 'feature', 'tech-debt', 'docs']) {
              if (labels.includes(key) && owners[key]) {
                selected = owners[key];
                break;
              }
            }

            if (!selected) {
              selected = '${{ vars.DEFAULT_ISSUE_ASSIGNEE }}';
            }

            if (!selected) {
              core.info('No assignee variables configured. Skipping assignment.');
              return;
            }

            const desired = selected
              .split(',')
              .map((v) => v.trim())
              .filter(Boolean);

            if (!desired.length) {
              core.info('Configured assignee list is empty after parsing.');
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: desired
            });

            core.info(`Assigned issue #${issue.number} to: ${desired.join(', ')}`);
